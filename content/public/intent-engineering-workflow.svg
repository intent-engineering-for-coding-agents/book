<text class="subtitle" x="92" y="112">Intent Engineering for Coding Agents</text>
<text class="title" x="92" y="198">Intent Engineering Workflow</text>
<text class="dek" x="92" y="258">A practical workflow from the book.</text>
<text class="dek" x="92" y="306">Agents generate code. Teams still need durable intent.</text>

<g class="trace">
  <path d="M100 360 H1140"/>
  <path d="M120 1560 H1120"/>
</g>

<g transform="translate(96,388)">
  <path class="line" d="M523 74 V804"/>
  <circle class="trace-node" cx="523" cy="74" r="13"/>
  <circle class="trace-node" cx="523" cy="228" r="13"/>
  <circle class="trace-node" cx="523" cy="382" r="13"/>
  <circle class="trace-node" cx="523" cy="536" r="13"/>
  <circle class="trace-node" cx="523" cy="690" r="13"/>
  <circle class="trace-node" cx="523" cy="844" r="13"/>

  <g transform="translate(0,0)">
    <rect class="stage" x="0" y="0" width="1048" height="148" rx="28"/>
    <rect class="stage-accent" x="0" y="0" width="192" height="148" rx="28"/>
    <circle class="stage-number" cx="78" cy="74" r="36"/>
    <text x="67" y="86" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700">1</text>
    <text class="stage-title" x="144" y="58">Structure</text>
    <text class="stage-copy" x="144" y="96">Make the repo legible in plain text.</text>
    <text class="stage-copy" x="144" y="126">File structure, architecture, design docs, and ADRs come first.</text>
  </g>

  <g transform="translate(0,154)">
    <rect class="stage" x="0" y="0" width="1048" height="148" rx="28"/>
    <rect class="stage-accent" x="0" y="0" width="192" height="148" rx="28"/>
    <circle class="stage-number" cx="78" cy="74" r="36"/>
    <text x="67" y="86" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700">2</text>
    <text class="stage-title" x="144" y="58">Instructions</text>
    <text class="stage-copy" x="144" y="96">Point agents at rules they can load and follow.</text>
    <text class="stage-copy" x="144" y="126">Use AGENTS.md, instruction hubs, skills, and hooks by job.</text>
  </g>

  <g transform="translate(0,308)">
    <rect class="stage" x="0" y="0" width="1048" height="148" rx="28"/>
    <rect class="stage-accent" x="0" y="0" width="192" height="148" rx="28"/>
    <circle class="stage-number" cx="78" cy="74" r="36"/>
    <text x="67" y="86" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700">3</text>
    <text class="stage-title" x="144" y="58">Specs</text>
    <text class="stage-copy" x="144" y="96">Define one small change at a time.</text>
    <text class="stage-copy" x="144" y="126">Capture acceptance criteria, constraints, and boundaries.</text>
  </g>

  <g transform="translate(0,462)">
    <rect class="stage" x="0" y="0" width="1048" height="148" rx="28"/>
    <rect class="stage-accent" x="0" y="0" width="192" height="148" rx="28"/>
    <circle class="stage-number" cx="78" cy="74" r="36"/>
    <text x="67" y="86" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700">4</text>
    <text class="stage-title" x="144" y="58">Implementation</text>
    <text class="stage-copy" x="144" y="96">Keep generated code downstream of intent.</text>
    <text class="stage-copy" x="144" y="126">The agent builds from the spec, not from guesswork.</text>
  </g>

  <g transform="translate(0,616)">
    <rect class="stage" x="0" y="0" width="1048" height="148" rx="28"/>
    <rect class="stage-accent" x="0" y="0" width="192" height="148" rx="28"/>
    <circle class="stage-number" cx="78" cy="74" r="36"/>
    <text x="67" y="86" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700">5</text>
    <text class="stage-title" x="144" y="58">Proof</text>
    <text class="stage-copy" x="144" y="96">Map tests and checks back to acceptance criteria.</text>
    <text class="stage-copy" x="144" y="126">Evidence beats ritual.</text>
  </g>

  <g transform="translate(0,770)">
    <rect class="stage" x="0" y="0" width="1048" height="148" rx="28"/>
    <rect class="stage-accent" x="0" y="0" width="192" height="148" rx="28"/>
    <circle class="stage-number" cx="78" cy="74" r="36"/>
    <text x="67" y="86" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700">6</text>
    <text class="stage-title" x="144" y="58">Review</text>
    <text class="stage-copy" x="144" y="96">Review intent first, proof second, diff third.</text>
    <text class="stage-copy" x="144" y="126">Start upstream, where the real mistake usually starts.</text>
  </g>
</g>

<g transform="translate(96,1368)">
  <rect class="panel" x="0" y="0" width="506" height="260" rx="28"/>
  <text class="panel-title" x="34" y="48">Artifacts</text>
  <text class="panel-copy" x="34" y="92">docs/ and indexes explain the system.</text>
  <text class="panel-copy" x="34" y="128">AGENTS.md points at the right instructions.</text>
  <text class="panel-copy" x="34" y="164">Small specs hold one change at a time.</text>
  <text class="panel-copy" x="34" y="200">ADRs capture cross-cutting decisions.</text>
  <text class="panel-copy" x="34" y="236">Tests tie back to stable acceptance criteria.</text>
</g>

<g transform="translate(638,1368)">
  <rect class="panel" x="0" y="0" width="506" height="260" rx="28"/>
  <text class="panel-title" x="34" y="48">Failure Modes</text>
  <text class="panel-copy" x="34" y="92">Context lives in somebody's head.</text>
  <text class="panel-copy" x="34" y="128">The spec is too large for one pass.</text>
  <text class="panel-copy" x="34" y="164">Instructions sound wise but cannot be checked.</text>
  <text class="panel-copy" x="34" y="200">Tests exist but do not prove intent.</text>
  <text class="panel-copy" x="34" y="236">Review starts at the diff.</text>
</g>

<text class="small" x="96" y="1678">Archive what mattered. Reuse what stayed true.</text>
<text class="url" x="96" y="1718">intent-engineering-for-coding-agents.github.io/book</text>
</svg>
