    .title { fill: #ffffff; font-family: Helvetica, Arial, sans-serif; font-size: 72px; font-weight: 700; }
    .subtitle { fill: #bbccdd; font-family: Helvetica, Arial, sans-serif; font-size: 26px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .dek { fill: #ffffff; font-family: Helvetica, Arial, sans-serif; font-size: 34px; font-weight: 400; opacity: 0.94; }
    .stage-title { fill: #223344; font-family: Helvetica, Arial, sans-serif; font-size: 32px; font-weight: 700; }
    .stage-copy { fill: #223344; font-family: Helvetica, Arial, sans-serif; font-size: 23px; font-weight: 400; }
    .panel-title { fill: #ffffff; font-family: Helvetica, Arial, sans-serif; font-size: 30px; font-weight: 700; }
    .panel-copy { fill: #ffffff; font-family: Helvetica, Arial, sans-serif; font-size: 22px; font-weight: 400; }
    .small { fill: #ffffff; font-family: Helvetica, Arial, sans-serif; font-size: 22px; font-weight: 400; opacity: 0.72; }
    .url { fill: #ffffff; font-family: Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 400; letter-spacing: 1px; opacity: 0.56; }
  </style>
</defs>

